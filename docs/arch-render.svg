<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="460" viewBox="0 0 1060 460">
  <defs>
    <pattern id="d2" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#e3dccd"/></pattern>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1 1 L8 4.5 L1 8" fill="none" stroke="#8a8276" stroke-width="1.8"/></marker>
    <style>
      .t{font-family:'Noto Sans TC';font-weight:900}
      .b{font-family:'Noto Sans TC';font-weight:700}
      .m{font-family:'Noto Sans TC';font-weight:500}
    </style>
  </defs>
  <rect width="1060" height="460" fill="#faf7f1"/>
  <rect width="1060" height="460" fill="url(#d2)" opacity="0.7"/>

  <text x="40" y="50" class="t" font-size="27" fill="#b4530a">② 上傳 Render 雲端執行</text>
  <text x="40" y="78" class="m" font-size="16" fill="#6b655c">同一顆 binary 包成 Docker 跑在雲端;任何人從網路連,語音與 AI 都走 Groq。</text>

  <!-- anyone (left) -->
  <g>
    <rect x="40" y="186" width="170" height="116" rx="14" fill="#fffdf8" stroke="#e3dccd" stroke-width="1.5"/>
    <text x="125" y="222" class="b" font-size="17" fill="#1c1a17" text-anchor="middle">任何人(網路)</text>
    <text x="125" y="248" class="m" font-size="13.5" fill="#6b655c" text-anchor="middle">手機 / 筆電</text>
    <text x="125" y="270" class="m" font-size="12.5" fill="#6b655c" text-anchor="middle">開 onrender.com 網址</text>
    <text x="125" y="289" class="m" font-size="12.5" fill="#6b655c" text-anchor="middle">零安裝</text>
  </g>
  <line x1="212" y1="244" x2="286" y2="244" stroke="#8a8276" stroke-width="2.4" marker-end="url(#a2)"/>
  <text x="249" y="234" class="m" font-size="12.5" fill="#8a8276" text-anchor="middle">HTTPS</text>

  <!-- Render cloud -->
  <rect x="290" y="118" width="420" height="284" rx="20" fill="#16130f" opacity="0.07" transform="translate(0,6)"/>
  <rect x="290" y="118" width="420" height="284" rx="20" fill="#eef3ef" stroke="#cdd9cd" stroke-width="2"/>
  <text x="312" y="150" class="b" font-size="18" fill="#1c1a17">Render 雲端</text>
  <text x="312" y="172" class="m" font-size="13" fill="#5a7d5e">TLS 在 Render edge 終結(容器內只跑 HTTP)</text>

  <rect x="312" y="186" width="376" height="196" rx="14" fill="#fffdf8" stroke="#e3dccd" stroke-width="1.5"/>
  <text x="332" y="214" class="b" font-size="14.5" fill="#b4530a">Docker 容器:mori-canvas-server</text>
  <g class="m" font-size="14.5" fill="#33302a">
    <text x="332" y="250">・內嵌前端(網頁) · /sync 即時同步(yjs)</text>
    <text x="332" y="300">・<tspan class="b" fill="#5a9e52">STT 語音</tspan> ───────────────▶</text>
    <text x="332" y="350">・<tspan class="b" fill="#3f76c0">AI 整理</tspan> ───────────────▶</text>
  </g>

  <!-- arrows out to Groq -->
  <line x1="688" y1="294" x2="784" y2="222" stroke="#8a8276" stroke-width="2.2" marker-end="url(#a2)"/>
  <line x1="688" y1="344" x2="784" y2="318" stroke="#8a8276" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- Groq services (right) -->
  <g>
    <rect x="790" y="184" width="234" height="80" rx="14" fill="#dff0d8" stroke="#b8dcab" stroke-width="1.5"/>
    <text x="907" y="214" class="b" font-size="16" fill="#274a23" text-anchor="middle">Groq Whisper</text>
    <text x="907" y="240" class="m" font-size="13" fill="#3d6b38" text-anchor="middle">語音轉文字 · v3-turbo</text>
  </g>
  <g>
    <rect x="790" y="288" width="234" height="80" rx="14" fill="#dce8f8" stroke="#aecbef" stroke-width="1.5"/>
    <text x="907" y="318" class="b" font-size="16" fill="#1f3d68" text-anchor="middle">Groq gpt-oss-120b</text>
    <text x="907" y="344" class="m" font-size="13" fill="#345080" text-anchor="middle">整理成便利貼 + 圖</text>
  </g>

  <text x="40" y="440" class="m" font-size="14.5" fill="#6b655c">key 用站長的(Render env)· 資料暫時(免費方案重啟會清空,想留請匯出)· per-IP 限流 · 適合:免裝試玩、分享給大家。</text>
</svg>
