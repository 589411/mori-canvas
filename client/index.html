<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>Mori Canvas 共筆白板</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// set theme before paint (no flash). default = light.
			try { var t = localStorage.getItem('mc-theme'); if (t) document.documentElement.setAttribute('data-theme', t) } catch (e) {}
		</script>
		<style>
			/* LIGHT — warm paper, deep-amber accent, a whisper of Mori violet */
			:root {
				--bg: #f1ece1;
				--paper: #f1ece1;
				--surface: #fdfbf7;
				--surface-soft: rgba(255, 255, 255, 0.55);
				--surface-hover: #ffffff;
				--ink: #1c1a17;
				--ink-soft: #6b655c;
				--line: rgba(28, 26, 23, 0.1);
				--line-strong: rgba(28, 26, 23, 0.18);
				--accent: #b4530a; /* deep amber */
				--accent-hover: #97450a;
				--accent-soft: #f6e6d3;
				--mori: #7c3aed; /* subtle Mori violet — used sparingly */
				--live: #e11d48;
				--on-accent: #ffffff;
				--glass: rgba(252, 250, 245, 0.7);
				--glass-border: rgba(255, 255, 255, 0.65);
				--dot: rgba(28, 26, 23, 0.055);
				--scrim: rgba(28, 26, 23, 0.42);
				--shadow: 0 10px 30px -12px rgba(28, 26, 23, 0.3), 0 3px 8px -3px rgba(28, 26, 23, 0.12);
				--ui: 'Hanken Grotesk', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
				--display: 'Fraunces', 'Noto Sans TC', serif;
			}
			/* DARK — soft warm "forest night" (not pitch black), brighter amber, Mori-tinted */
			[data-theme='dark'] {
				--bg: #1e201c;
				--paper: #1e201c;
				--surface: #2a2c27;
				--surface-soft: rgba(236, 231, 220, 0.07);
				--surface-hover: #33352f;
				--ink: #ece7dc;
				--ink-soft: #9c968b;
				--line: rgba(236, 231, 220, 0.13);
				--line-strong: rgba(236, 231, 220, 0.24);
				--accent: #d9762a;
				--accent-hover: #e8853a;
				--accent-soft: rgba(217, 118, 42, 0.18);
				--mori: #a78bfa;
				--live: #f43f5e;
				--on-accent: #ffffff;
				--glass: rgba(33, 35, 30, 0.74);
				--glass-border: rgba(236, 231, 220, 0.12);
				--dot: rgba(236, 231, 220, 0.06);
				--scrim: rgba(0, 0, 0, 0.6);
				--shadow: 0 12px 34px -12px rgba(0, 0, 0, 0.6), 0 3px 8px -3px rgba(0, 0, 0, 0.45);
			}
			* { box-sizing: border-box; }
			html, body, #root { margin: 0; height: 100%; }
			body {
				font-family: var(--ui);
				color: var(--ink);
				background: var(--bg);
				-webkit-font-smoothing: antialiased;
				text-rendering: optimizeLegibility;
				transition: background 0.3s ease, color 0.3s ease;
			}
			/* warm paper canvas with a faint dot grid for depth */
			.board-bg {
				background-color: var(--paper);
				background-image: radial-gradient(var(--dot) 1.1px, transparent 1.1px);
				background-size: 24px 24px;
				background-position: -1px -1px;
			}
			.glass {
				background: var(--glass);
				backdrop-filter: blur(16px) saturate(1.3);
				-webkit-backdrop-filter: blur(16px) saturate(1.3);
				border: 1px solid var(--glass-border);
				box-shadow: var(--shadow);
				border-radius: 16px;
			}
			.btn {
				font-family: var(--ui);
				font-size: 13px;
				font-weight: 500;
				color: var(--ink);
				background: var(--surface-soft);
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 6px 11px;
				cursor: pointer;
				transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
				white-space: nowrap;
				-webkit-tap-highlight-color: transparent;
			}
			.btn:hover { background: var(--surface-hover); border-color: var(--line-strong); }
			.btn:active { transform: translateY(1px) scale(0.98); }
			.btn:disabled { opacity: 0.4; cursor: default; }
			.btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
			.btn-primary:hover { filter: brightness(1.1); }
			.btn-accent { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
			.btn-accent:hover { background: var(--accent-hover); }
			.btn-on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
			.btn-live { background: var(--live); color: #fff; border-color: var(--live); animation: livePulse 1.6s ease-in-out infinite; }
			@keyframes livePulse {
				0%, 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.45); }
				50% { box-shadow: 0 0 0 9px rgba(225, 29, 72, 0); }
			}
			@keyframes fadeScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: none; } }
			@keyframes floatIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
			.float-in { animation: floatIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
			.modal-in { animation: fadeScale 0.22s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
			.code { font-family: var(--display); font-weight: 600; letter-spacing: 0.04em; }
			/* ===== unified component layer — every surface themes from here, so dark mode
			   never gets missed. Prefer these classes over inline colours. ===== */
			/* text inputs theme automatically (radios/checkboxes keep native look) */
			input, textarea, select { font-family: var(--ui); }
			textarea, input:not([type='radio']):not([type='checkbox']):not([type='range']) {
				background: var(--surface);
				color: var(--ink);
				border: 1px solid var(--line);
				border-radius: 8px;
				padding: 7px 9px;
			}
			textarea::placeholder, input::placeholder { color: var(--ink-soft); opacity: 0.8; }
			input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: transparent; }
			.muted { color: var(--ink-soft); }
			.accent-text { color: var(--accent); }
			/* dialogs: one scrim + one card, both themed */
			.scrim { position: fixed; inset: 0; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 16px; background: var(--scrim); backdrop-filter: blur(3px); }
			.dialog-card { background: var(--surface); color: var(--ink); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 22px; }
			/* button variants */
			.btn-danger { color: var(--live); border-color: color-mix(in srgb, var(--live) 40%, var(--line)); }
			.btn-danger:hover { background: color-mix(in srgb, var(--live) 12%, var(--surface)); border-color: var(--live); }
			.btn-rec { background: var(--ink); color: var(--bg); border-color: var(--ink); }
			.btn-rec.live { background: var(--live); color: #fff; border-color: var(--live); }
			/* left tool strip: compact vertical buttons (icon + tiny label) */
			.toolstrip { position: fixed; top: 78px; left: 14px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
			.tool { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; width: 60px; min-height: 50px; padding: 6px 4px; font-size: 11px; line-height: 1.1; color: var(--ink); background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease; -webkit-tap-highlight-color: transparent; }
			.tool .ico { font-size: 17px; line-height: 1; }
			.tool:hover { background: var(--surface-hover); border-color: var(--line-strong); }
			.tool:active { transform: translateY(1px) scale(0.97); }
			.tool:disabled { opacity: 0.4; cursor: default; }
			.tool.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
			.tool-divider { height: 1px; background: var(--line); margin: 2px 6px; }
			/* the app uses inline styles, so style bare <button> for a cohesive modern look */
			button {
				font-family: var(--ui);
				font-weight: 500;
				font-size: 13px;
				color: var(--ink);
				background: var(--surface-soft);
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 6px 11px;
				cursor: pointer;
				white-space: nowrap;
				-webkit-tap-highlight-color: transparent;
				transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
			}
			button:hover { background: var(--surface-hover); border-color: var(--line-strong); box-shadow: 0 2px 10px -4px rgba(28, 26, 23, 0.25); }
			button:active { transform: translateY(1px) scale(0.98); }
			button:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
			.live { animation: livePulse 1.6s ease-in-out infinite; }
			@media (max-width: 700px) { button { padding: 9px 13px; font-size: 14px; } }
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
